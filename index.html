<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controlo de Combustível</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .car-manage { margin-bottom: 15px; }
        .add-car-btn {
            padding: 10px 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        .car-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .car-btn-wrapper { position: relative; }
        .car-btn {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .car-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .edit-car, .remove-car {
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            top: -8px;
        }
        .edit-car { background: #4CAF50; left: -5px; }
        .remove-car { background: #ff4444; right: -5px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; }
        .unit { position: absolute; right: 16px; color: #999; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #f5f5f5; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: #667eea; color: white; }
        
        .result { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; margin: 20px 0; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #ff4444; color: white; }
        .btn-secondary { background: #eee; }

        .history-item { border-bottom: 1px solid #f0f0f0; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .history-value { font-weight: bold; color: #667eea; }
        .delete-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 30px; width: 90%; max-width: 400px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛽ Controlo de Combustível</h1>
        </div>

        <div class="card">
            <div class="car-manage">
                <button class="add-car-btn" id="add-car-btn">+ Adicionar Carro</button>
            </div>
            <div class="car-selector" id="car-selector"></div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="money">€ → Litros</button>
                <button class="tab-btn" data-tab="liters">Litros → €</button>
            </div>

            <div class="tab-content active" id="money-tab">
                <div class="input-group">
                    <label>Preço por Litro</label>
                    <div class="input-wrapper">
                        <input type="number" id="price-money" step="0.001" value="1.650">
                        <span class="unit">€/L</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Quanto quer gastar?</label>
                    <div class="input-wrapper">
                        <input type="number" id="money-input" placeholder="50.00">
                        <span class="unit">€</span>
                    </div>
                </div>
                <div class="result" id="liters-result" style="display: none;">
                    <div>Vai abastecer</div>
                    <div style="font-size: 24px; font-weight: bold;"><span id="liters-value">0</span> L</div>
                </div>
                <button class="btn btn-primary" id="save-money-btn">Gravar Abastecimento</button>
            </div>

            <div class="tab-content" id="liters-tab">
                <div class="input-group">
                    <label>Preço por Litro</label>
                    <div class="input-wrapper">
                        <input type="number" id="price-liters" step="0.001" value="1.650">
                        <span class="unit">€/L</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Quantos litros?</label>
                    <div class="input-wrapper">
                        <input type="number" id="liters-input" placeholder="30.00">
                        <span class="unit">L</span>
                    </div>
                </div>
                <div class="result" id="money-result" style="display: none;">
                    <div>Vai custar</div>
                    <div style="font-size: 24px; font-weight: bold;"><span id="money-value">0</span> €</div>
                </div>
                <button class="btn btn-primary" id="save-liters-btn">Gravar Abastecimento</button>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 15px;">📊 Histórico</h2>
            <div id="history-container"></div>
            <div style="margin-top: 20px;">
                <button class="btn btn-primary" id="export-pdf-btn">📄 Exportar PDF</button>
                <button class="btn btn-danger" id="clear-history-btn">🗑️ Limpar Tudo</button>
            </div>
        </div>
    </div>

    <div class="modal" id="car-name-modal">
        <div class="modal-content">
            <h3 id="modal-title">Nome do Carro</h3>
            <div class="input-group" style="margin-top: 15px;">
                <input type="text" id="car-name-input" style="width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ddd;">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" id="cancel-car-btn">Cancelar</button>
                <button class="btn btn-primary" id="confirm-car-btn">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        let currentCar = 1;
        let history = [];
        let cars = [];
        let editingCarId = null;

        function loadData() {
            const savedHistory = localStorage.getItem('fuelHistory');
            const savedCars = localStorage.getItem('fuelCars');
            history = savedHistory ? JSON.parse(savedHistory) : [];
            cars = savedCars ? JSON.parse(savedCars) : [{ id: 1, name: 'Meu Carro' }];
            currentCar = cars[0].id;
            renderCars();
            renderHistory();
        }

        function saveCars() { localStorage.setItem('fuelCars', JSON.stringify(cars)); }
        function saveHistory() { localStorage.setItem('fuelHistory', JSON.stringify(history)); }

        function renderCars() {
            const container = document.getElementById('car-selector');
            container.innerHTML = cars.map(car => `
                <div class="car-btn-wrapper">
                    <button class="edit-car" onclick="openEditCar(${car.id})">✏️</button>
                    <button class="car-btn ${car.id === currentCar ? 'active' : ''}" onclick="selectCar(${car.id})">
                        ${car.name}
                    </button>
                    ${cars.length > 1 ? `<button class="remove-car" onclick="removeCar(${car.id})">×</button>` : ''}
                </div>
            `).join('');
        }

        window.selectCar = (id) => {
            currentCar = id;
            renderCars();
        };

        // Modal Logic
        const modal = document.getElementById('car-name-modal');
        const carInput = document.getElementById('car-name-input');

        document.getElementById('add-car-btn').onclick = () => {
            editingCarId = null;
            document.getElementById('modal-title').innerText = "Adicionar Carro";
            carInput.value = "";
            modal.classList.add('active');
        };

        window.openEditCar = (id) => {
            editingCarId = id;
            const car = cars.find(c => c.id === id);
            document.getElementById('modal-title').innerText = "Editar Nome";
            carInput.value = car.name;
            modal.classList.add('active');
        };

        document.getElementById('cancel-car-btn').onclick = () => modal.classList.remove('active');

        document.getElementById('confirm-car-btn').onclick = () => {
            const name = carInput.value.trim();
            if (!name) return alert("Insere um nome!");

            if (editingCarId) {
                const car = cars.find(c => c.id === editingCarId);
                car.name = name;
            } else {
                const newId = Date.now();
                cars.push({ id: newId, name: name });
                currentCar = newId;
            }
            saveCars();
            renderCars();
            renderHistory();
            modal.classList.remove('active');
        };

        window.removeCar = (id) => {
            if (confirm("Apagar este carro e os seus registos?")) {
                cars = cars.filter(c => c.id !== id);
                history = history.filter(h => h.car !== id);
                if (currentCar === id && cars.length > 0) currentCar = cars[0].id;
                saveCars();
                saveHistory();
                renderCars();
                renderHistory();
            }
        };

        // Cálculos e Abastecimentos
        function calculate() {
            const pM = parseFloat(document.getElementById('price-money').value);
            const mM = parseFloat(document.getElementById('money-input').value);
            if (pM && mM) {
                document.getElementById('liters-value').innerText = (mM / pM).toFixed(2);
                document.getElementById('liters-result').style.display = 'block';
            }

            const pL = parseFloat(document.getElementById('price-liters').value);
            const lL = parseFloat(document.getElementById('liters-input').value);
            if (pL && lL) {
                document.getElementById('money-value').innerText = (pL * lL).toFixed(2);
                document.getElementById('money-result').style.display = 'block';
            }
        }

        document.querySelectorAll('input').forEach(i => i.oninput = calculate);

        document.getElementById('save-money-btn').onclick = () => {
            const price = parseFloat(document.getElementById('price-money').value);
            const money = parseFloat(document.getElementById('money-input').value);
            if (!money) return;
            
            history.unshift({
                id: Date.now(),
                date: new Date().toISOString(),
                car: currentCar,
                money: money,
                liters: money / price,
                price: price
            });
            saveHistory();
            renderHistory();
            document.getElementById('money-input').value = "";
            alert("Gravado!");
        };

        document.getElementById('save-liters-btn').onclick = () => {
            const price = parseFloat(document.getElementById('price-liters').value);
            const liters = parseFloat(document.getElementById('liters-input').value);
            if (!liters) return;
            
            history.unshift({
                id: Date.now(),
                date: new Date().toISOString(),
                car: currentCar,
                money: liters * price,
                liters: liters,
                price: price
            });
            saveHistory();
            renderHistory();
            document.getElementById('liters-input').value = "";
            alert("Gravado!");
        };

        function renderHistory() {
            const container = document.getElementById('history-container');
            if (history.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#999;'>Sem registos.</p>";
                return;
            }
            container.innerHTML = history.map(h => {
                const car = cars.find(c => c.id === h.car) || { name: 'Desconhecido' };
                return `
                <div class="history-item">
                    <div>
                        <div style="font-size:12px; color:#999;">${new Date(h.date).toLocaleDateString()}</div>
                        <div style="font-weight:bold;">${car.name}</div>
                        <div style="font-size:14px;">${h.liters.toFixed(2)}L @ ${h.price.toFixed(3)}€</div>
                    </div>
                    <div style="text-align:right;">
                        <div class="history-value">${h.money.toFixed(2)} €</div>
                        <button class="delete-btn" onclick="deleteEntry(${h.id})">🗑️</button>
                    </div>
                </div>`;
            }).join('');
        }

        window.deleteEntry = (id) => {
            if (confirm("Apagar registo?")) {
                history = history.filter(h => h.id !== id);
                saveHistory();
                renderHistory();
            }
        };

        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
            };
        });

        document.getElementById('clear-history-btn').onclick = () => {
            if (confirm("Limpar tudo?")) { history = []; saveHistory(); renderHistory(); }
        };

        loadData();
    </script>
</body>
</html>
