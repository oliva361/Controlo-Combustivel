<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controlo de Combustível</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
            padding-bottom: 50px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 25px; }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* Gestão de Carros */
        .car-manage { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .add-car-btn {
            padding: 10px 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        .car-selector { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .car-btn-wrapper { position: relative; margin-top: 10px; }
        .car-btn {
            padding: 12px 18px;
            border: 2px solid #eee;
            background: #f9f9f9;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .car-btn.active { background: #667eea; color: white; border-color: #667eea; }
        
        .edit-car, .remove-car {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid white;
            color: white;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            top: -10px;
        }
        .edit-car { background: #4CAF50; left: -8px; }
        .remove-car { background: #ff4444; right: -8px; }

        /* Tabs e Inputs */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #f0f0f0; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: #667eea; color: white; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #444; }
        .input-wrapper { position: relative; }
        .input-wrapper input { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; }
        .unit { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #888; font-weight: bold; }

        .result { background: #f0f4ff; border-left: 5px solid #667eea; padding: 15px; border-radius: 10px; text-align: center; margin: 15px 0; display: none; }
        .result-val { font-size: 22px; font-weight: bold; color: #764ba2; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #ff4444; color: white; margin-top: 10px; }
        .btn-pdf { background: #2d3436; color: white; margin-top: 15px; }

        /* Histórico */
        .history-item { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .delete-entry { background: none; border: none; font-size: 18px; cursor: pointer; padding: 5px; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 25px; width: 85%; max-width: 350px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>⛽ Controlo Combustível</h1>
        </div>

        <div class="card">
            <div class="car-manage">
                <span style="font-weight: bold; color: #555;">Veículo:</span>
                <button class="add-car-btn" id="add-car-btn">+ Novo</button>
            </div>
            <div class="car-selector" id="car-selector"></div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="money">€ → Litros</button>
                <button class="tab-btn" data-tab="liters">Litros → €</button>
            </div>

            <div class="tab-content active" id="money-tab">
                <div class="input-group">
                    <label>Preço Atual</label>
                    <div class="input-wrapper">
                        <input type="number" id="price-money" step="0.001" value="1.659">
                        <span class="unit">€/L</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Valor a Abastecer</label>
                    <div class="input-wrapper">
                        <input type="number" id="money-input" placeholder="Ex: 50">
                        <span class="unit">€</span>
                    </div>
                </div>
                <div class="result" id="res-money">
                    <p>Vais meter:</p>
                    <div class="result-val"><span id="val-liters">0</span> L</div>
                </div>
                <button class="btn btn-primary" onclick="saveRecord('money')">Gravar Abastecimento</button>
            </div>

            <div class="tab-content" id="liters-tab">
                <div class="input-group">
                    <label>Preço Atual</label>
                    <div class="input-wrapper">
                        <input type="number" id="price-liters" step="0.001" value="1.659">
                        <span class="unit">€/L</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Quantidade de Litros</label>
                    <div class="input-wrapper">
                        <input type="number" id="liters-input" placeholder="Ex: 30">
                        <span class="unit">L</span>
                    </div>
                </div>
                <div class="result" id="res-liters">
                    <p>Total a pagar:</p>
                    <div class="result-val"><span id="val-money">0</span> €</div>
                </div>
                <button class="btn btn-primary" onclick="saveRecord('liters')">Gravar Abastecimento</button>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 15px; color: #333;">📊 Histórico</h3>
            <div id="history-list"></div>
            
            <button class="btn btn-pdf" id="export-pdf-btn">📄 Gerar PDF (iPhone/Android)</button>
            <button class="btn btn-danger" onclick="clearAll()">🗑️ Limpar Tudo</button>
        </div>
    </div>

    <div class="modal" id="car-modal">
        <div class="modal-content">
            <h3 id="modal-title">Veículo</h3>
            <input type="text" id="car-name-input" placeholder="Nome (Ex: BMW, Clio)" 
                   style="width:100%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid #ddd;">
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="background:#eee;" onclick="closeModal()">Sair</button>
                <button class="btn btn-primary" onclick="confirmCar()">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        let cars = JSON.parse(localStorage.getItem('fuelCars')) || [{ id: 1, name: 'Meu Carro' }];
        let history = JSON.parse(localStorage.getItem('fuelHistory')) || [];
        let currentCarId = cars[0].id;
        let editingCarId = null;

        function init() {
            renderCars();
            renderHistory();
            setupCalculations();
        }

        function renderCars() {
            const container = document.getElementById('car-selector');
            container.innerHTML = cars.map(car => `
                <div class="car-btn-wrapper">
                    <button class="edit-car" onclick="openCarModal(${car.id})">✏️</button>
                    <button class="car-btn ${car.id === currentCarId ? 'active' : ''}" onclick="selectCar(${car.id})">
                        ${car.name}
                    </button>
                    ${cars.length > 1 ? `<button class="remove-car" onclick="removeCar(${car.id})">✕</button>` : ''}
                </div>
            `).join('');
        }

        function selectCar(id) { currentCarId = id; renderCars(); }

        function openCarModal(id = null) {
            editingCarId = id;
            const input = document.getElementById('car-name-input');
            document.getElementById('modal-title').innerText = id ? "Editar Nome" : "Novo Carro";
            input.value = id ? cars.find(c => c.id === id).name : "";
            document.getElementById('car-modal').classList.add('active');
            input.focus();
        }

        function closeModal() { document.getElementById('car-modal').classList.remove('active'); }

        function confirmCar() {
            const name = document.getElementById('car-name-input').value.trim();
            if (!name) return;
            if (editingCarId) {
                cars.find(c => c.id === editingCarId).name = name;
            } else {
                const newCar = { id: Date.now(), name: name };
                cars.push(newCar);
                currentCarId = newCar.id;
            }
            saveData();
            renderCars();
            renderHistory();
            closeModal();
        }

        function removeCar(id) {
            if (confirm("Apagar veículo?")) {
                cars = cars.filter(c => c.id !== id);
                history = history.filter(h => h.carId !== id);
                if (currentCarId === id) currentCarId = cars[0].id;
                saveData();
                renderCars();
                renderHistory();
            }
        }

        function setupCalculations() {
            const inputs = ['price-money', 'money-input', 'price-liters', 'liters-input'];
            inputs.forEach(id => {
                document.getElementById(id).addEventListener('input', () => {
                    const pM = parseFloat(document.getElementById('price-money').value);
                    const mM = parseFloat(document.getElementById('money-input').value);
                    if (pM && mM) {
                        document.getElementById('val-liters').innerText = (mM / pM).toFixed(2);
                        document.getElementById('res-money').style.display = 'block';
                    }
                    const pL = parseFloat(document.getElementById('price-liters').value);
                    const lL = parseFloat(document.getElementById('liters-input').value);
                    if (pL && lL) {
                        document.getElementById('val-money').innerText = (pL * lL).toFixed(2);
                        document.getElementById('res-liters').style.display = 'block';
                    }
                });
            });
        }

        function saveRecord(type) {
            let price, amount, liters, money;
            if (type === 'money') {
                price = parseFloat(document.getElementById('price-money').value);
                amount = parseFloat(document.getElementById('money-input').value);
                if (!amount) return;
                liters = amount / price;
                money = amount;
            } else {
                price = parseFloat(document.getElementById('price-liters').value);
                amount = parseFloat(document.getElementById('liters-input').value);
                if (!amount) return;
                money = amount * price;
                liters = amount;
            }
            history.unshift({ id: Date.now(), date: new Date().toISOString(), carId: currentCarId, money: money, liters: liters, price: price });
            saveData();
            renderHistory();
            alert("✅ Gravado!");
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if (history.length === 0) {
                list.innerHTML = "<p style='color:#999; text-align:center;'>Sem registos.</p>";
                return;
            }
            list.innerHTML = history.map(h => {
                const car = cars.find(c => c.id === h.carId) || { name: '---' };
                return `
                <div class="history-item">
                    <div>
                        <small>${new Date(h.date).toLocaleDateString()} - <strong>${car.name}</strong></small><br>
                        <span>${h.liters.toFixed(2)}L @ ${h.price.toFixed(3)}€</span>
                    </div>
                    <div style="text-align:right">
                        <strong style="color:#667eea">${h.money.toFixed(2)}€</strong>
                        <button class="delete-entry" onclick="deleteEntry(${h.id})">🗑️</button>
                    </div>
                </div>`;
            }).join('');
        }

        function deleteEntry(id) {
            if (confirm("Apagar?")) {
                history = history.filter(h => h.id !== id);
                saveData();
                renderHistory();
            }
        }

        function clearAll() { if (confirm("Limpar tudo?")) { history = []; saveData(); renderHistory(); } }

        function saveData() {
            localStorage.setItem('fuelCars', JSON.stringify(cars));
            localStorage.setItem('fuelHistory', JSON.stringify(history));
        }

        // --- EXPORTAÇÃO PDF (MODO HÍBRIDO IPHONE/PWA) ---
        document.getElementById('export-pdf-btn').onclick = async () => {
            if (history.length === 0) return alert('Sem dados!');
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                let y = 20;

                doc.setFontSize(16);
                doc.text('Relatório de Abastecimentos', 105, y, { align: 'center' });
                y += 15;

                doc.setFontSize(10);
                history.forEach((h) => {
                    const carName = cars.find(c => c.id === h.carId)?.name || '---';
                    const date = new Date(h.date).toLocaleDateString('pt-PT');
                    const line = `${date} | ${carName} | ${h.liters.toFixed(2)}L | Total: ${h.money.toFixed(2)}€`;
                    doc.text(line, 20, y);
                    y += 10;
                    if (y > 280) { doc.addPage(); y = 20; }
                });

                // Detetar iOS (iPhone/iPad)
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                
                if (isIOS) {
                    // No iPhone/PWA, abrimos num novo separador
                    const blob = doc.output('blob');
                    const url = URL.createObjectURL(blob);
                    window.open(url, '_blank');
                    alert("O PDF abriu num novo separador. Clique no botão de 'Partilhar' do iPhone para guardar nos Ficheiros.");
                } else {
                    // Download normal para Android/PC
                    doc.save(`Abastecimentos_${Date.now()}.pdf`);
                }
            } catch (e) {
                alert("Erro ao gerar PDF.");
            }
        };

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
            };
        });

        document.getElementById('add-car-btn').onclick = () => openCarModal();
        init();
    </script>
</body>
</html>
